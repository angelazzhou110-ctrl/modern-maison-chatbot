<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Modern Maison Chatbot UI</title>
  <style>
    body {
      margin: 0;
      font-family: "Helvetica Neue", Arial, sans-serif;
      background: transparent;
    }

    #chat-trigger {
      position: fixed;
      right: 24px;
      bottom: 24px;
      z-index: 9999;
      background: #faf8f4;
      border: 1px solid #d9d2c7;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #2b2b2b;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.2s ease;
    }

    #chat-trigger:hover {
      background: #ffffff;
      transform: translateY(-1px);
    }

    #chatbox {
      position: fixed;
      right: 24px;
      bottom: 78px;
      width: 340px;
      background: rgba(255, 255, 255, 0.98);
      border: 1px solid #ddd7cf;
      border-radius: 18px;
      overflow: hidden;
      display: none;
      z-index: 9998;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
    }

    #chat-header {
      padding: 18px 20px 12px;
      border-bottom: 1px solid #ece7e0;
      background: #fbfaf7;
    }

    #chat-title {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 18px;
      font-weight: 400;
      margin-bottom: 4px;
      color: #222;
    }

    #chat-subtitle {
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #6b675f;
    }

    #chat-messages {
      height: 280px;
      overflow-y: auto;
      padding: 16px;
      background: #fff;
    }

    .msg {
      max-width: 85%;
      padding: 12px 14px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.55;
      margin-bottom: 12px;
      color: #222;
    }

    .bot {
      background: #f8f5f0;
      border: 1px solid #ece5db;
    }

    .user {
      background: #f1efea;
      border: 1px solid #e6e0d7;
      margin-left: auto;
    }

    #chat-input-wrap {
      border-top: 1px solid #ece7e0;
      background: #fbfaf7;
      padding: 12px;
    }

    #chat-input {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid #ddd7cf;
      background: #fff;
      border-radius: 999px;
      padding: 12px 14px;
      font-size: 14px;
      outline: none;
      color: #222;
    }

    #chat-input::placeholder {
      color: #8b867f;
    }

    @media (max-width: 480px) {
      #chatbox {
        right: 12px;
        left: 12px;
        width: auto;
        bottom: 72px;
      }

      #chat-trigger {
        right: 12px;
        bottom: 12px;
      }
    }
  </style>
</head>
<body>
  <button id="chat-trigger">Ask Modern Maison</button>

  <div id="chatbox">
    <div id="chat-header">
      <div id="chat-title">Modern Maison</div>
      <div id="chat-subtitle">Concierge</div>
    </div>

    <div id="chat-messages">
      <div class="msg bot">
        Welcome — I can help with classes, private workshops, catering, and more.
      </div>
    </div>

    <div id="chat-input-wrap">
      <input id="chat-input" type="text" placeholder="Ask a question..." />
    </div>
  </div>

  <script>
    const trigger = document.getElementById("chat-trigger");
    const chatbox = document.getElementById("chatbox");
    const input = document.getElementById("chat-input");
    const messages = document.getElementById("chat-messages");

    trigger.addEventListener("click", () => {
      chatbox.style.display = chatbox.style.display === "block" ? "none" : "block";
    });

    function addMessage(text, cls) {
      const div = document.createElement("div");
      div.className = `msg ${cls}`;
      div.textContent = text;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }

    async function sendMessage() {
      const text = input.value.trim();
      if (!text) return;

      addMessage(text, "user");
      input.value = "";

      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ message: text })
        });

        const data = await res.json();
        addMessage(data.response, "bot");
      } catch (error) {
        addMessage("Sorry — something went wrong.", "bot");
        console.error(error);
      }
    }

    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        sendMessage();
      }
    });
  </script>
</body>
</html>
